  <title>Финансы</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:#050505;overscroll-behavior:none;}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;color:white;}
    #root{height:100%;}
    ::-webkit-scrollbar{display:none;}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
    input::placeholder{color:rgba(255,255,255,0.18);}
    .emoji{filter:grayscale(1) brightness(1.8);display:inline-block;}

    @keyframes ripple{0%{transform:scale(0);opacity:0.6;}100%{transform:scale(5);opacity:0;}}
    @keyframes slideUp{from{transform:translateY(110%);opacity:0;}to{transform:translateY(0);opacity:1;}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes scaleIn{from{opacity:0;transform:scale(0.92);}to{opacity:1;transform:scale(1);}}

    /* ── Liquid Glass core ── */
    .lg{
      background:
        linear-gradient(145deg,rgba(255,255,255,0.13) 0%,rgba(255,255,255,0.04) 50%,rgba(255,255,255,0.07) 100%);
      backdrop-filter:blur(48px) saturate(220%) brightness(1.06) contrast(1.04);
      -webkit-backdrop-filter:blur(48px) saturate(220%) brightness(1.06) contrast(1.04);
      border:1px solid rgba(255,255,255,0.16);
      border-bottom:1px solid rgba(0,0,0,0.35);
      border-right:1px solid rgba(0,0,0,0.18);
      box-shadow:
        0 1.5px 0 0 rgba(255,255,255,0.12) inset,
        0 -1px 0 0 rgba(0,0,0,0.5) inset,
        1px 0 0 0 rgba(255,255,255,0.06) inset,
        0 32px 64px rgba(0,0,0,0.65),
        0 8px 24px rgba(0,0,0,0.45),
        0 2px 8px rgba(0,0,0,0.35);
    }
    .lg-deep{
      background:
        linear-gradient(160deg,rgba(255,255,255,0.07) 0%,rgba(255,255,255,0.02) 60%,rgba(255,255,255,0.04) 100%);
      backdrop-filter:blur(64px) saturate(240%) brightness(1.04);
      -webkit-backdrop-filter:blur(64px) saturate(240%) brightness(1.04);
      border:1px solid rgba(255,255,255,0.1);
      border-bottom:1px solid rgba(0,0,0,0.4);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.08) inset,
        0 -1px 0 rgba(0,0,0,0.6) inset,
        0 24px 56px rgba(0,0,0,0.7),
        0 6px 18px rgba(0,0,0,0.5);
    }
    .lg-pill{
      background:linear-gradient(180deg,rgba(255,255,255,0.11) 0%,rgba(255,255,255,0.05) 100%);
      backdrop-filter:blur(32px) saturate(200%);
      -webkit-backdrop-filter:blur(32px) saturate(200%);
      border:1px solid rgba(255,255,255,0.14);
      border-bottom:1px solid rgba(0,0,0,0.3);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.1) inset,
        0 -1px 0 rgba(0,0,0,0.4) inset,
        0 8px 24px rgba(0,0,0,0.5),
        0 2px 6px rgba(0,0,0,0.4);
    }
    .lg-inset{
      background:linear-gradient(160deg,rgba(0,0,0,0.25),rgba(0,0,0,0.1));
      border:1px solid rgba(255,255,255,0.05);
      border-top:1px solid rgba(0,0,0,0.4);
      box-shadow:inset 0 2px 8px rgba(0,0,0,0.5),inset 0 1px 3px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

// ── Emoji palette (monochrome-style, renders B&W on iOS) ──────────────────
const EMOJI_PALETTE = [
  "🍽️","🥐","☕","🧃","🍕","🛒","👕","👟","💄","📱","💻","🎮","🎬","🎵",
  "✈️","🚗","🚇","🚌","🏠","🏥","💊","🏋️","📚","✏️","💼","💰","🎁","🐾",
  "🌿","⚡","🔑","📦","🧾","💳","🪴","🧹","🔧","📡","🎯","🏦","💡","🪙"
];

const DEFAULT_CATS_EXPENSE = [
  {id:"food",      emoji:"🍽️", label:"Еда"},
  {id:"coffee",    emoji:"☕",  label:"Кофе"},
  {id:"transport", emoji:"🚗",  label:"Транспорт"},
  {id:"shopping",  emoji:"🛒",  label:"Покупки"},
  {id:"health",    emoji:"💊",  label:"Здоровье"},
  {id:"fun",       emoji:"🎬",  label:"Развлечения"},
  {id:"home",      emoji:"🏠",  label:"Дом"},
  {id:"tech",      emoji:"📱",  label:"Техника"},
  {id:"other_exp", emoji:"📦",  label:"Прочее"},
];
const DEFAULT_CATS_INCOME = [
  {id:"salary",    emoji:"💼",  label:"Зарплата"},
  {id:"freelance", emoji:"💻",  label:"Фриланс"},
  {id:"gift",      emoji:"🎁",  label:"Подарок"},
  {id:"invest",    emoji:"📈",  label:"Инвестиции"},
  {id:"other_inc", emoji:"💰",  label:"Прочее"},
];

const STORAGE_KEY = "finapp_v3";
function loadData(){
  try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch{}
  return{entries:[],budget:50000,catsExpense:[...DEFAULT_CATS_EXPENSE],catsIncome:[...DEFAULT_CATS_INCOME]};
}
function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{}}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmt(n){return new Intl.NumberFormat("ru-RU").format(Math.round(n))+" ₽";}
function fmtDate(s){return new Date(s).toLocaleDateString("ru-RU",{day:"numeric",month:"short"});}
function getCat(cats,id){return cats.find(c=>c.id===id)||{emoji:"📦",label:"Прочее",id:"other"};}

// ── Ripple ─────────────────────────────────────────────────────────────────
function Rip({onClick,style,children,className}){
  const ref=useRef();
  function go(e){
    const btn=ref.current;
    const old=btn.querySelectorAll('.rr');
    old.forEach(o=>o.remove());
    const c=document.createElement('span');
    const rect=btn.getBoundingClientRect();
    const x=e.clientX-rect.left,y=e.clientY-rect.top;
    c.className='rr';
    c.style.cssText=`position:absolute;border-radius:50%;background:rgba(255,255,255,0.18);width:140px;height:140px;left:${x-70}px;top:${y-70}px;animation:ripple 0.65s cubic-bezier(.4,0,.2,1) forwards;pointer-events:none;z-index:0;`;
    btn.appendChild(c);
    setTimeout(()=>c.remove(),700);
    if(onClick)onClick(e);
  }
  return <button ref={ref} onClick={go} style={{position:"relative",overflow:"hidden",...style}} className={className}>{children}</button>;
}

// ── Progress bar ───────────────────────────────────────────────────────────
function Bar({value,max,bright}){

  return(
    <div style={{height:3,borderRadius:99,overflow:"hidden"}} className="lg-inset">
      <div style={{height:"100%",width:pct+"%",borderRadius:99,
        background:bright?"rgba(255,255,255,0.75)":"rgba(255,255,255,0.4)",
        boxShadow:bright?"0 0 10px rgba(255,255,255,0.3)":"none",
        transition:"width 0.7s cubic-bezier(.4,0,.2,1)"}}/>
    </div>
  );
}

// ── Donut ──────────────────────────────────────────────────────────────────
function Donut({data,total,center}){
  const S=148,cx=74,cy=74,r=56,sw=10,circ=2*Math.PI*r;
  let off=0;
  const grays=["rgba(255,255,255,0.85)","rgba(255,255,255,0.55)","rgba(255,255,255,0.32)","rgba(255,255,255,0.18)","rgba(255,255,255,0.1)"];
  const slices=data.map((d,i)=>{
    const dash=(total>0?d.amount/total:0)*circ;
    const s={...d,dash,gap:circ-dash,offset:off,col:grays[i%grays.length]};off+=dash;return s;
  });
  return(
    <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`}>
      <defs>
        <filter id="glow2"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" floodColor="rgba(0,0,0,0.6)"/></filter>
      </defs>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={sw}/>
      {slices.map((s,i)=>(
        <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.col} strokeWidth={sw}
          strokeDasharray={`${s.dash-1} ${s.gap+1}`}
          strokeDashoffset={-s.offset}
          style={{transform:"rotate(-90deg)",transformOrigin:"50% 50%",filter:"url(#glow2)",transition:"all 0.5s"}}/>
      ))}
      {center&&<>
        <text x={cx} y={cy-7} textAnchor="middle" fill="rgba(255,255,255,0.28)" fontSize={8} fontFamily="system-ui" letterSpacing={1.5}>{center.label}</text>
        <text x={cx} y={cy+8} textAnchor="middle" fill="rgba(255,255,255,0.9)" fontSize={15} fontWeight="300" fontFamily="system-ui">{center.value}</text>
      </>}
    </svg>
  );
}

            <p style={{color:balance>=0?"rgba(255,255,255,0.85)":"rgba(255,255,255,0.4)",fontSize:17,fontWeight:"300"}}>{balance>=0?"+":""}{fmt(balance)}</p>
          </div>
        </div>
      </div>

      {/* Savings rate */}
      {monthInc>0&&(
        <div className="lg" style={{padding:20,borderRadius:24}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
            <span style={{color:"rgba(255,255,255,0.3)",fontSize:9,letterSpacing:2}}>НОРМА СБЕРЕЖЕНИЙ</span>
            <span style={{color:"rgba(255,255,255,0.3)",fontSize:9}}>{Math.max(0,Math.round((1-monthExp/monthInc)*100))}%</span>
          </div>
          <Bar value={Math.max(0,monthInc-monthExp)} max={monthInc} bright/>
          <p style={{color:"rgba(255,255,255,0.18)",fontSize:11,marginTop:10}}>Сэкономлено {fmt(Math.max(0,balance))} из {fmt(monthInc)}</p>

      )}

      {/* By source */}
      {byCat.length>0&&(
        <div className="lg" style={{padding:20,borderRadius:24}}>
          <p style={{color:"rgba(255,255,255,0.25)",fontSize:9,letterSpacing:2,margin:"0 0 16px"}}>ИСТОЧНИКИ ДОХОДА</p>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {byCat.map((c,i)=>(
              <div key={c.id} style={{display:"flex",alignItems:"center",gap:12}}>
                <div className="lg-deep" style={{width:36,height:36,borderRadius:12,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}><span className="emoji">{c.emoji}</span></div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{color:"rgba(255,255,255,0.65)",fontSize:13}}>{c.label}</span>
                    <span style={{color:"rgba(255,255,255,0.5)",fontSize:13,fontWeight:"300"}}>{fmt(c.amount)}</span>
                  </div>
                  <Bar value={c.amount} max={byCat[0].amount} bright={i===0}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Quick add income */}
      <div className="lg" style={{padding:20,borderRadius:24}}>
        <p style={{color:"rgba(255,255,255,0.25)",fontSize:9,letterSpacing:2,margin:"0 0 14px"}}>ДОБАВИТЬ ДОХОД</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          {catsIncome.map(c=>(
            <Rip key={c.id} onClick={()=>onAdd("income")}
              style={{padding:"14px 4px",borderRadius:16,display:"flex",flexDirection:"column",alignItems:"center",gap:8,cursor:"pointer",border:"none"}} className="lg-deep">
              <span style={{fontSize:22}}><span className="emoji">{c.emoji}</span></span>
              <span style={{color:"rgba(255,255,255,0.28)",fontSize:9,fontFamily:"system-ui",letterSpacing:0.5,textAlign:"center",lineHeight:1.2}}>{c.label}</span>
            </Rip>
          ))}
        </div>
      </div>

      {recent.length>0&&(
        <div className="lg" style={{padding:"18px 20px",borderRadius:24}}>
          <p style={{color:"rgba(255,255,255,0.25)",fontSize:9,letterSpacing:2,margin:"0 0 14px"}}>ПОСЛЕДНИЕ ДОХОДЫ</p>
          <EntryList entries={recent} cats={catsIncome}/>
        </div>
      )}
    </div>
  );
}

// ── Entry list ─────────────────────────────────────────────────────────────
function EntryList({entries,cats}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {entries.map(e=>{
        const cat=getCat(cats,e.category);
        return(
          <div key={e.id} style={{display:"flex",alignItems:"center",gap:12}}>
            <div className="lg-deep" style={{width:36,height:36,borderRadius:12,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}><span className="emoji">{cat.emoji}</span></div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{color:"rgba(255,255,255,0.75)",fontSize:14,margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.note}</p>
              <p style={{color:"rgba(255,255,255,0.2)",fontSize:10,margin:"2px 0 0",letterSpacing:0.5}}>{cat.label} · {e.date.slice(0,10)===todayStr()?"Сегодня":fmtDate(e.date)}</p>
            </div>
            <span style={{color:"rgba(255,255,255,0.5)",fontSize:14,fontWeight:"300",flexShrink:0}}>{e.type==="income"?"+":"-"}{fmt(e.amount)}</span>
          </div>
        );
      })}
    </div>

}

// ── ANALYSIS PAGE ──────────────────────────────────────────────────────────
function AnalysisPage({entries,budget,catsExpense,catsIncome}){
  const [period,setPeriod]=useState("month");
  const [view,setView]=useState("expense"); // expense | income | balance
  const now=new Date();

  const filtered=entries.filter(e=>{
    const d=new Date(e.date);
    if(period==="today") return e.date.slice(0,10)===todayStr();
    if(period==="week"){const w=new Date(now);w.setDate(now.getDate()-7);return d>=w;}
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  });
  const exp=filtered.filter(e=>e.type==="expense");
  const inc=filtered.filter(e=>e.type==="income");
  const totalExp=exp.reduce((s,e)=>s+e.amount,0);
  const totalInc=inc.reduce((s,e)=>s+e.amount,0);

  const expByCat=catsExpense.map(c=>({...c,amount:exp.filter(e=>e.category===c.id).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.amount>0).sort((a,b)=>b.amount-a.amount);
  const incByCat=catsIncome.map(c=>({...c,amount:inc.filter(e=>e.category===c.id).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.amount>0).sort((a,b)=>b.amount-a.amount);

  const days=Array.from({length:14},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(13-i));
    const ds=d.toISOString().slice(0,10);
    return{
      day:d.getDate(),
      exp:entries.filter(e=>e.date.slice(0,10)===ds&&e.type==="expense").reduce((s,e)=>s+e.amount,0),
      inc:entries.filter(e=>e.date.slice(0,10)===ds&&e.type==="income").reduce((s,e)=>s+e.amount,0),
    };
  });
  const maxDay=Math.max(...days.map(d=>Math.max(d.exp,d.inc)),1);
  const ps=[{id:"today",l:"День"},{id:"week",l:"Неделя"},{id:"month",l:"Месяц"}];

  const activeCats=view==="expense"?expByCat:incByCat;
  const activeTotal=view==="expense"?totalExp:totalInc;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Period */}
      <div className="lg-deep" style={{padding:"3px",display:"flex",gap:3,borderRadius:18}}>
        {ps.map(p=>(
          <Rip key={p.id} onClick={()=>setPeriod(p.id)}
            style={{flex:1,padding:"11px",borderRadius:15,fontSize:12,fontWeight:period===p.id?"600":"400",cursor:"pointer",fontFamily:"system-ui",letterSpacing:0.5,transition:"all 0.2s",
              color:period===p.id?"white":"rgba(255,255,255,0.28)",
              background:period===p.id?"rgba(255,255,255,0.09)":"transparent",
              border:period===p.id?"1px solid rgba(255,255,255,0.12)":"1px solid transparent",
              boxShadow:period===p.id?"0 1px 0 rgba(255,255,255,0.06) inset,0 4px 12px rgba(0,0,0,0.4)":"none"}}>
            {p.l}
          </Rip>
        ))}
      </div>

      {/* Summary cards */}
      <div style={{display:"flex",gap:10}}>
        {[
          {id:"expense",label:"РАСХОДЫ",value:fmt(totalExp),sub:period==="month"?`из ${fmt(budget)}`:""},
          {id:"income", label:"ДОХОДЫ", value:fmt(totalInc),sub:""},
        ].map(card=>(
          <Rip key={card.id} onClick={()=>setView(card.id)}
            style={{flex:1,padding:18,borderRadius:22,display:"flex",flexDirection:"column",gap:6,cursor:"pointer",
              border:view===card.id?"1px solid rgba(255,255,255,0.18)":"1px solid rgba(255,255,255,0.07)",
              background:view===card.id?"rgba(255,255,255,0.07)":"rgba(255,255,255,0.02)",
              boxShadow:view===card.id?"0 1px 0 rgba(255,255,255,0.08) inset,0 12px 32px rgba(0,0,0,0.5)":"0 4px 12px rgba(0,0,0,0.3)"}}>
            <p style={{color:"rgba(255,255,255,0.28)",fontSize:8,letterSpacing:2,margin:0}}>{card.label}</p>
            <p style={{color:"rgba(255,255,255,0.88)",fontSize:18,fontWeight:"300",margin:0,letterSpacing:-0.5}}>{card.value}</p>
            {card.sub&&<p style={{color:"rgba(255,255,255,0.2)",fontSize:10,margin:0}}>{card.sub}</p>}
          </Rip>
        ))}
      </div>

      {/* Balance */}
      <div className="lg" style={{padding:20,borderRadius:24}}>
        <p style={{color:"rgba(255,255,255,0.25)",fontSize:9,letterSpacing:2,margin:"0 0 8px"}}>БАЛАНС ПЕРИОДА</p>
        <p style={{color:"rgba(255,255,255,0.85)",fontSize:28,fontWeight:"200",margin:"0 0 12px",letterSpacing:-1}}>
          {totalInc-totalExp>=0?"+":""}{fmt(totalInc-totalExp)}
        </p>
        {totalInc>0&&<>
          <Bar value={Math.max(0,totalInc-totalExp)} max={totalInc} bright/>
          <p style={{color:"rgba(255,255,255,0.18)",fontSize:10,marginTop:8}}>
            Сохранено {totalInc>0?Math.max(0,Math.round((1-totalExp/totalInc)*100)):0}% от дохода
          </p>
        </>}
      </div>

      {/* Donut + by category */}
      <div className="lg" style={{padding:20,borderRadius:24}}>
        <div className="lg-deep" style={{display:"flex",padding:"3px",borderRadius:14,marginBottom:18}}>
          {[{id:"expense",l:"Расходы"},{id:"income",l:"Доходы"}].map(v=>(
            <Rip key={v.id} onClick={()=>setView(v.id)}
              style={{flex:1,padding:"9px",borderRadius:11,fontSize:12,cursor:"pointer",fontFamily:"system-ui",
                color:view===v.id?"white":"rgba(255,255,255,0.28)",
                background:view===v.id?"rgba(255,255,255,0.09)":"transparent",
                border:view===v.id?"1px solid rgba(255,255,255,0.1)":"1px solid transparent"}}>
              {v.l}
            </Rip>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:20,marginBottom:20}}>
          <Donut data={activeCats} total={activeTotal} center={{label:view==="expense"?"РАСХОД":"ДОХОД",value:activeTotal>9999?(activeTotal/1000).toFixed(0)+"к":Math.round(activeTotal)}}/>
          <div style={{flex:1}}>
            {activeCats.slice(0,4).map((c,i)=>(
              <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{width:8,height:8,borderRadius:2,background:["rgba(255,255,255,0.8)","rgba(255,255,255,0.5)","rgba(255,255,255,0.3)","rgba(255,255,255,0.15)"][i]}}/>
                <span style={{color:"rgba(255,255,255,0.5)",fontSize:11,flex:1}}>{c.label}</span>
                <span style={{color:"rgba(255,255,255,0.6)",fontSize:11}}>{activeTotal>0?Math.round(c.amount/activeTotal*100):0}%</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {activeCats.map((c,i)=>(
            <div key={c.id}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div className="lg-deep" style={{width:30,height:30,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}><span className="emoji">{c.emoji}</span></div>
                  <span style={{color:"rgba(255,255,255,0.65)",fontSize:13}}>{c.label}</span>
                </div>
                <span style={{color:"rgba(255,255,255,0.5)",fontSize:13,fontWeight:"300"}}>{fmt(c.amount)}</span>
              </div>
              <Bar value={c.amount} max={activeTotal} bright={i===0}/>
            </div>
          ))}
          {activeCats.length===0&&<p style={{color:"rgba(255,255,255,0.15)",textAlign:"center",fontSize:13,padding:"16px 0"}}>Нет данных</p>}
        </div>
      </div>

      {/* Trend */}
      <div className="lg" style={{padding:20,borderRadius:24}}>
        <p style={{color:"rgba(255,255,255,0.25)",fontSize:9,letterSpacing:2,margin:"0 0 16px"}}>ТРЕНД 14 ДНЕЙ</p>
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:72}}>
          {days.map((d,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{width:"100%",display:"flex",flexDirection:"column",justifyContent:"flex-end",gap:2,height:60}}>
                {d.inc>0&&<div style={{width:"100%",borderRadius:"3px 3px 0 0",height:Math.max(2,(d.inc/maxDay)*28),background:"rgba(255,255,255,0.5)",boxShadow:"0 0 8px rgba(255,255,255,0.15)"}}/>}
                {d.exp>0&&<div style={{width:"100%",borderRadius:d.inc>0?"0":"3px 3px 0 0",height:Math.max(2,(d.exp/maxDay)*28),background:d.day===now.getDate()?"rgba(255,255,255,0.8)":"rgba(255,255,255,0.18)",boxShadow:d.day===now.getDate()?"0 0 10px rgba(255,255,255,0.3)":"none"}}/>}
              </div>
              <span style={{fontSize:8,color:"rgba(255,255,255,0.18)",fontFamily:"system-ui"}}>{d.day}</span>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:16,marginTop:10}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:8,height:3,borderRadius:2,background:"rgba(255,255,255,0.18)"}}/><span style={{color:"rgba(255,255,255,0.2)",fontSize:10}}>Расходы</span></div>
          <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:8,height:3,borderRadius:2,background:"rgba(255,255,255,0.5)"}}/><span style={{color:"rgba(255,255,255,0.2)",fontSize:10}}>Доходы</span></div>
        </div>
      </div>
    </div>
  );
}

// ── SETTINGS PAGE ──────────────────────────────────────────────────────────

          <div>
            <p style={{color:"rgba(255,255,255,0.4)",fontSize:11,margin:"0 0 4px",letterSpacing:0.5}}>Месячный лимит расходов</p>

          </div>
          <Rip onClick={onBudget} style={{padding:"10px 18px",borderRadius:14,fontSize:11,cursor:"pointer",fontFamily:"system-ui",letterSpacing:1}} className="lg-pill">ИЗМЕНИТЬ</Rip>
        </div>
      </div>

      {/* Expense categories */}
      <div className="lg" style={{padding:22,borderRadius:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <p style={{color:"rgba(255,255,255,0.25)",fontSize:9,letterSpacing:2,margin:0}}>КАТЕГОРИИ РАСХОДОВ</p>
          <Rip onClick={()=>setShowAddExp(true)} style={{padding:"6px 14px",borderRadius:10,fontSize:10,cursor:"pointer",fontFamily:"system-ui",letterSpacing:1}} className="lg-deep">+ ДОБАВИТЬ</Rip>

        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {data.catsExpense.map(c=>(

      </div>

      {/* Income categories */}
      <div className="lg" style={{padding:22,borderRadius:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <p style={{color:"rgba(255,255,255,0.25)",fontSize:9,letterSpacing:2,margin:0}}>КАТЕГОРИИ ДОХОДОВ</p>
          <Rip onClick={()=>setShowAddInc(true)} style={{padding:"6px 14px",borderRadius:10,fontSize:10,cursor:"pointer",fontFamily:"system-ui",letterSpacing:1}} className="lg-deep">+ ДОБАВИТЬ</Rip>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {data.catsIncome.map(c=>(
            <CatRow key={c.id} cat={c} isDefault={DEFAULT_CATS_INCOME.find(d=>d.id===c.id)} onDelete={()=>onDeleteCat("income",c.id)}/>
          ))}

      {/* Stats */}
      <div className="lg" style={{padding:22,borderRadius:24}}>
        <p style={{color:"rgba(255,255,255,0.25)",fontSize:9,letterSpacing:2,margin:"0 0 14px"}}>СТАТИСТИКА</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[
            {l:"Всего записей",v:data.entries.length},
            {l:"Расходов",v:data.entries.filter(e=>e.type==="expense").length},
            {l:"Доходов",v:data.entries.filter(e=>e.type==="income").length},
            {l:"Категорий",v:data.catsExpense.length+data.catsIncome.length},
          ].map(s=>(
            <div key={s.l} className="lg-deep" style={{padding:"14px 16px",borderRadius:16}}>

              <p style={{color:"rgba(255,255,255,0.75)",fontSize:24,fontWeight:"200",margin:0}}>{s.v}</p>
            </div>
          ))}
        </div>
      </div>

      {showAddExp&&<AddCatModal onClose={()=>setShowAddExp(false)} onAdd={c=>{onAddCat("expense",c);setShowAddExp(false);}}/>}
      {showAddInc&&<AddCatModal onClose={()=>setShowAddInc(false)} onAdd={c=>{onAddCat("income",c);setShowAddInc(false);}}/>}
    </div>
  );
}

function CatRow({cat,isDefault,onDelete}){
  return(
    <div className="lg-deep" style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:14}}>
      <span style={{fontSize:20,width:28,textAlign:"center"}}><span className="emoji">{cat.emoji}</span></span>

    </div>
  );
}

// ── HISTORY PAGE ───────────────────────────────────────────────────────────
function HistoryPage({entries,catsExpense,catsIncome,onDelete,onExport}){
  const [filter,setFilter]=useState("all");
  const filtered=filter==="all"?entries:entries.filter(e=>e.type===filter);
  const sorted=[...filtered].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const grouped={};
  sorted.forEach(e=>{const k=e.date.slice(0,10);if(!grouped[k])grouped[k]=[];grouped[k].push(e);});

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",gap:8}}>
        <Rip onClick={onExport} style={{flex:1,padding:"12px",borderRadius:14,fontSize:10,cursor:"pointer",fontFamily:"system-ui",letterSpacing:1.5}} className="lg-deep">↓ ЭКСПОРТ CSV</Rip>
        <div className="lg-deep" style={{display:"flex",padding:"3px",borderRadius:14,gap:3}}>
          {[{id:"all",l:"Все"},{id:"expense",l:"Расходы"},{id:"income",l:"Доходы"}].map(f=>(
            <Rip key={f.id} onClick={()=>setFilter(f.id)}
              style={{padding:"9px 12px",borderRadius:11,fontSize:11,cursor:"pointer",fontFamily:"system-ui",
                color:filter===f.id?"white":"rgba(255,255,255,0.28)",
                background:filter===f.id?"rgba(255,255,255,0.09)":"transparent",
                border:filter===f.id?"1px solid rgba(255,255,255,0.1)":"1px solid transparent"}}>
              {f.l}
            </Rip>
          ))}
        </div>
      </div>

      {Object.keys(grouped).length===0&&(
        <div className="lg" style={{padding:48,textAlign:"center",borderRadius:24}}>
          <p style={{fontSize:32,marginBottom:12,opacity:0.2}}>📋</p>
          <p style={{color:"rgba(255,255,255,0.2)",fontSize:12,letterSpacing:2}}>НЕТ ЗАПИСЕЙ</p>
        </div>
      )}
      {Object.keys(grouped).map(date=>{
        const dayExp=grouped[date].filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount,0);
        const dayInc=grouped[date].filter(e=>e.type==="income").reduce((s,e)=>s+e.amount,0);
        return(
          <div key={date} className="lg" style={{padding:"16px 18px",borderRadius:24}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:14,alignItems:"center"}}>
              <span style={{color:"rgba(255,255,255,0.28)",fontSize:9,letterSpacing:2}}>
                {date===todayStr()?"СЕГОДНЯ":fmtDate(date).toUpperCase()}
              </span>
              <div>
                {dayInc>0&&<span style={{color:"rgba(255,255,255,0.45)",fontSize:11,marginRight:10}}>+{fmt(dayInc)}</span>}
                {dayExp>0&&<span style={{color:"rgba(255,255,255,0.55)",fontSize:11}}>−{fmt(dayExp)}</span>}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {grouped[date].map(e=>{
                const cats=e.type==="expense"?catsExpense:catsIncome;
                const cat=getCat(cats,e.category);
                return(
                  <div key={e.id} className="lg-deep" style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:16}}>
                    <div style={{width:34,height:34,borderRadius:12,flexShrink:0,background:"rgba(255,255,255,0.04)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}><span className="emoji">{cat.emoji}</span></div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{color:"rgba(255,255,255,0.75)",fontSize:14,margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.note}</p>
                      <p style={{color:"rgba(255,255,255,0.2)",fontSize:10,margin:"2px 0 0",letterSpacing:0.5}}>{cat.label}</p>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <p style={{color:e.type==="income"?"rgba(255,255,255,0.7)":"rgba(255,255,255,0.5)",fontSize:14,fontWeight:"300",margin:0}}>
                        {e.type==="income"?"+":"-"}{fmt(e.amount)}
                      </p>
                      <button onClick={()=>onDelete(e.id)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.14)",fontSize:9,cursor:"pointer",fontFamily:"system-ui",letterSpacing:1}}>УДАЛИТЬ</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────
function App(){
  const [data,setData]=useState(loadData);
  const [tab,setTab]=useState("expenses");
  const [addType,setAddType]=useState(null); // "expense"|"income"|null
  const [showBudget,setShowBudget]=useState(false);

  useEffect(()=>{saveData(data);},[data]);

  const addEntry=useCallback(e=>setData(d=>({...d,entries:[e,...d.entries]})),[]);
  const deleteEntry=useCallback(id=>setData(d=>({...d,entries:d.entries.filter(e=>e.id!==id)})),[]);
  const setBudget=useCallback(b=>setData(d=>({...d,budget:b})),[]);
  const addCat=useCallback((type,c)=>setData(d=>({...d,[type==="expense"?"catsExpense":"catsIncome"]:[...d[type==="expense"?"catsExpense":"catsIncome"],c]})),[]);
  const deleteCat=useCallback((type,id)=>setData(d=>({...d,[type==="expense"?"catsExpense":"catsIncome"]:d[type==="expense"?"catsExpense":"catsIncome"].filter(c=>c.id!==id)})),[]);

  function exportCSV(){
    const allCats=[...data.catsExpense,...data.catsIncome];
    const rows=[
      ["Дата","Тип","Сумма ₽","Категория","Заметка"],
      ...data.entries
        .sort((a,b)=>new Date(b.date)-new Date(a.date))
        .map(e=>[
          e.date.slice(0,10),
          e.type==="income"?"Доход":"Расход",
          e.amount,
          getCat(allCats,e.category).label,
          e.note
        ])
    ];
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="финансы_"+new Date().toISOString().slice(0,10)+".csv";a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }

  const TABS=[
    {id:"expenses", emoji:"↓",  label:"Расходы"},
    {id:"income",   emoji:"↑",  label:"Доходы"},
    {id:"analysis", emoji:"◎",  label:"Анализ"},
    {id:"history",  emoji:"≡",  label:"История"},
    {id:"settings", emoji:"⚙",  label:"Настройки"},
  ];
  const now=new Date();

  return(
    <>
      {/* BG */}
      <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",background:"#050505"}}/>
      <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",
        background:"radial-gradient(ellipse 120% 50% at 50% -10%,rgba(255,255,255,0.035),transparent 55%)",
      }}/>

      <div style={{maxWidth:430,margin:"0 auto",minHeight:"100dvh",position:"relative",zIndex:1,display:"flex",flexDirection:"column"}}>
        {/* Status bar */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"max(16px,env(safe-area-inset-top)) 24px 6px",flexShrink:0}}>
          <span style={{color:"rgba(255,255,255,0.35)",fontSize:12,fontWeight:"500",letterSpacing:1}}>
            {now.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"})}
          </span>
          <span style={{color:"rgba(255,255,255,0.18)",fontSize:13,letterSpacing:3}}>●●●</span>
        </div>

        {/* Header */}
        <div style={{padding:"4px 20px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <h1 style={{color:"white",fontSize:24,fontWeight:"200",letterSpacing:-0.5}}>
            {TABS.find(t=>t.id===tab)?.label}
          </h1>
          <Rip onClick={()=>setAddType(tab==="income"?"income":"expense")}
            style={{width:40,height:40,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:22,color:"white",fontWeight:"200",border:"none"}}
            className="lg-pill">
            +
          </Rip>
        </div>

        {/* Content */}
        <div style={{flex:1,overflowY:"auto",padding:"0 14px 112px",scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}}>
          <div style={{animation:"fadeIn 0.22s ease"}} key={tab}>
            {tab==="expenses" &&<ExpensesPage entries={data.entries} budget={data.budget} catsExpense={data.catsExpense} onAdd={t=>setAddType(t)}/>}
            {tab==="income"   &&<IncomePage   entries={data.entries} catsIncome={data.catsIncome} onAdd={t=>setAddType(t)}/>}
            {tab==="analysis" &&<AnalysisPage entries={data.entries} budget={data.budget} catsExpense={data.catsExpense} catsIncome={data.catsIncome}/>}
            {tab==="history"  &&<HistoryPage  entries={data.entries} catsExpense={data.catsExpense} catsIncome={data.catsIncome} onDelete={deleteEntry} onExport={exportCSV}/>}
            {tab==="settings" &&<SettingsPage data={data} onBudget={()=>setShowBudget(true)} onAddCat={addCat} onDeleteCat={deleteCat}/>}
          </div>
        </div>

        {/* Tab bar */}
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,
          padding:"10px 12px",paddingBottom:"max(22px,env(safe-area-inset-bottom))",
          backdropFilter:"blur(56px) saturate(220%) brightness(1.04)",
          WebkitBackdropFilter:"blur(56px) saturate(220%) brightness(1.04)",
          background:"rgba(5,5,5,0.78)",
          borderTop:"1px solid rgba(255,255,255,0.08)",
          display:"flex",gap:3,zIndex:50}}>
          {TABS.map(t=>(
            <Rip key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,padding:"9px 2px",borderRadius:14,display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",transition:"all 0.2s",
                background:tab===t.id?"rgba(255,255,255,0.09)":"transparent",
                border:tab===t.id?"1px solid rgba(255,255,255,0.1)":"1px solid transparent",
                boxShadow:tab===t.id?"0 1px 0 rgba(255,255,255,0.06) inset,0 4px 12px rgba(0,0,0,0.4)":"none"}}>
              <span style={{fontSize:15,opacity:tab===t.id?1:0.22,transition:"opacity 0.2s"}}>{t.emoji}</span>
              <span style={{fontSize:8,fontFamily:"system-ui",letterSpacing:0.5,color:tab===t.id?"rgba(255,255,255,0.75)":"rgba(255,255,255,0.2)",fontWeight:tab===t.id?"500":"400",transition:"color 0.2s"}}>
                {t.label.toUpperCase()}
              </span>
            </Rip>
          ))}
        </div>
      </div>

      {addType&&<AddModal onClose={()=>setAddType(null)} onAdd={addEntry} catsExpense={data.catsExpense} catsIncome={data.catsIncome} defaultType={addType}/>}
      {showBudget&&<BudgetModal onClose={()=>setShowBudget(false)} budget={data.budget} onSave={setBudget}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
