<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Финансы" />
  <title>Учёт финансов</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #0a0a14; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; }
    ::-webkit-scrollbar { display: none; }
    #root { height: 100%; }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    input::placeholder { color: rgba(255,255,255,0.25); }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Constants ──────────────────────────────────────────────────────────────
const CATEGORIES = [
  { id: "food",      emoji: "🍔", label: "Еда",         color: "#FF6B6B" },
  { id: "transport", emoji: "🚗", label: "Транспорт",   color: "#4ECDC4" },
  { id: "shopping",  emoji: "🛍️", label: "Покупки",     color: "#A78BFA" },
  { id: "health",    emoji: "💊", label: "Здоровье",    color: "#34D399" },
  { id: "coffee",    emoji: "☕", label: "Кофе",        color: "#F59E0B" },
  { id: "fun",       emoji: "🎮", label: "Развлечения", color: "#F472B6" },
  { id: "home",      emoji: "🏠", label: "Дом",         color: "#60A5FA" },
  { id: "other",     emoji: "📦", label: "Прочее",      color: "#94A3B8" },
];
const STORAGE_KEY = "finance_tracker_v1";

function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : { expenses: [], budget: 50000 }; }
  catch { return { expenses: [], budget: 50000 }; }
}
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }
function todayStr() { return new Date().toISOString().slice(0, 10); }
function formatMoney(n) { return new Intl.NumberFormat("ru-RU").format(Math.round(n)) + " ₽"; }
function formatDate(s) { return new Date(s).toLocaleDateString("ru-RU", { day: "numeric", month: "short" }); }
function getCat(id) { return CATEGORIES.find(c => c.id === id) || CATEGORIES[7]; }

// ── Style tokens ───────────────────────────────────────────────────────────
const glass = {
  background: "rgba(255,255,255,0.12)",
  backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
  border: "1px solid rgba(255,255,255,0.22)", borderRadius: 24,
};
const glassDeep = {
  background: "rgba(255,255,255,0.08)",
  backdropFilter: "blur(30px)", WebkitBackdropFilter: "blur(30px)",
  border: "1px solid rgba(255,255,255,0.15)", borderRadius: 20,
};

// ── Donut chart ────────────────────────────────────────────────────────────
function Donut({ data, total }) {
  const size=130,cx=65,cy=65,r=50,sw=14,circ=2*Math.PI*r;
  let off=0;
  const slices = data.map(d => {
    const dash=(total>0?d.amount/total:0)*circ;
    const s={...d,dash,gap:circ-dash,offset:off}; off+=dash; return s;
  });
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={sw}/>
      {slices.map((s,i)=>(
        <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={sw}
          strokeDasharray={`${s.dash} ${s.gap}`} strokeDashoffset={-s.offset} strokeLinecap="round"
          style={{transform:"rotate(-90deg)",transformOrigin:"50% 50%",transition:"all 0.4s"}}/>
      ))}
      <text x={cx} y={cy-6} textAnchor="middle" fill="rgba(255,255,255,0.6)" fontSize={10} fontFamily="system-ui">итого</text>
      <text x={cx} y={cy+10} textAnchor="middle" fill="white" fontSize={13} fontWeight="700" fontFamily="system-ui">
        {total>999?(total/1000).toFixed(1)+"к":total}
      </text>
    </svg>
  );
}

function Bar({ value, max, color }) {
  const pct = max>0?Math.min(value/max,1)*100:0;
  return (
    <div style={{height:6,borderRadius:99,background:"rgba(255,255,255,0.1)",overflow:"hidden"}}>
      <div style={{height:"100%",width:pct+"%",borderRadius:99,background:pct>90?"#FF6B6B":color,transition:"width 0.5s cubic-bezier(.4,0,.2,1)"}}/>
    </div>
  );
}

// ── Quick Add Modal ────────────────────────────────────────────────────────
function AddModal({ onClose, onAdd }) {
  const [amount, setAmount] = useState("");
  const [note, setNote] = useState("");
  const [cat, setCat] = useState("food");
  const pad = ["1","2","3","4","5","6","7","8","9",".","0","⌫"];

  function pressKey(k) {
    if (k==="⌫") { setAmount(a=>a.slice(0,-1)); return; }
    if (k==="." && amount.includes(".")) return;
    if (amount.length>=8) return;
    setAmount(a=>a+k);
  }
  function submit() {
    const n=parseFloat(amount.replace(",","."));
    if(!n||n<=0) return;
    onAdd({id:Date.now(),amount:n,note:note.trim()||getCat(cat).label,category:cat,date:new Date().toISOString()});
    onClose();
  }

  return (
    <div style={{position:"fixed",inset:0,zIndex:100,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",display:"flex",alignItems:"flex-end"}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:"100%",maxWidth:430,margin:"0 auto",borderRadius:"28px 28px 0 0",background:"rgba(20,20,40,0.92)",backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)",border:"1px solid rgba(255,255,255,0.15)",padding:"20px 20px 44px",animation:"slideUp 0.3s cubic-bezier(.4,0,.2,1)"}}>
        <div style={{width:40,height:4,background:"rgba(255,255,255,0.3)",borderRadius:99,margin:"0 auto 20px"}}/>
        <p style={{color:"rgba(255,255,255,0.45)",fontSize:13,textAlign:"center",margin:"0 0 6px"}}>
          {new Date().toLocaleDateString("ru-RU",{weekday:"long",day:"numeric",month:"long"})}
        </p>
        <div style={{textAlign:"center",marginBottom:20}}>
          <span style={{fontSize:52,fontWeight:"700",color:"white",letterSpacing:-2}}>{amount||"0"}</span>
          <span style={{fontSize:28,color:"rgba(255,255,255,0.4)",marginLeft:4}}>₽</span>
        </div>
        <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Заметка (необязательно)"
          style={{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:12,color:"white",padding:"10px 14px",fontSize:15,outline:"none",marginBottom:14,fontFamily:"system-ui"}}/>
        <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:18,scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}}>
          {CATEGORIES.map(c=>(
            <button key={c.id} onClick={()=>setCat(c.id)}
              style={{flexShrink:0,padding:"8px 14px",borderRadius:99,border:cat===c.id?`1px solid ${c.color}`:"1px solid rgba(255,255,255,0.1)",background:cat===c.id?`${c.color}30`:"rgba(255,255,255,0.06)",color:cat===c.id?c.color:"rgba(255,255,255,0.6)",fontSize:13,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"system-ui"}}>
              {c.emoji} {c.label}
            </button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
          {pad.map(k=>(
            <button key={k} onClick={()=>pressKey(k)}
              style={{padding:"16px",borderRadius:16,fontSize:22,fontWeight:"500",background:k==="⌫"?"rgba(255,107,107,0.2)":"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",color:k==="⌫"?"#FF6B6B":"white",cursor:"pointer",fontFamily:"system-ui"}}>
              {k}
            </button>
          ))}
        </div>
        <button onClick={submit} style={{width:"100%",padding:18,borderRadius:18,background:"linear-gradient(135deg,#A78BFA,#60A5FA)",border:"none",color:"white",fontSize:17,fontWeight:"700",cursor:"pointer",fontFamily:"system-ui",boxShadow:"0 8px 32px rgba(167,139,250,0.4)"}}>
          Добавить расход
        </button>
      </div>
    </div>
  );
}

// ── Budget Modal ───────────────────────────────────────────────────────────
function BudgetModal({ budget, onSave, onClose }) {
  const [val, setVal] = useState(String(budget));
  return (
    <div style={{position:"fixed",inset:0,zIndex:100,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center"}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:"88%",maxWidth:340,...glass,background:"rgba(20,20,40,0.95)",padding:28}}>
        <p style={{color:"white",fontSize:18,fontWeight:"700",margin:"0 0 20px",textAlign:"center"}}>Месячный бюджет</p>
        <input type="number" value={val} onChange={e=>setVal(e.target.value)}
          style={{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:14,color:"white",padding:"14px",fontSize:22,fontWeight:"700",textAlign:"center",outline:"none",fontFamily:"system-ui",marginBottom:20}}/>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose} style={{flex:1,padding:14,borderRadius:14,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.7)",fontSize:15,cursor:"pointer",fontFamily:"system-ui"}}>Отмена</button>
          <button onClick={()=>{const n=parseFloat(val);if(n>0){onSave(n);onClose();}}}
            style={{flex:1,padding:14,borderRadius:14,background:"linear-gradient(135deg,#A78BFA,#60A5FA)",border:"none",color:"white",fontSize:15,fontWeight:"700",cursor:"pointer",fontFamily:"system-ui"}}>Сохранить</button>
        </div>
      </div>
    </div>
  );
}

// ── Home screen ────────────────────────────────────────────────────────────
function HomeScreen({ expenses, budget, onAdd }) {
  const today = expenses.filter(e=>e.date.slice(0,10)===todayStr());
  const todayTotal = today.reduce((s,e)=>s+e.amount,0);
  const now = new Date();
  const monthTotal = expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((s,e)=>s+e.amount,0);
  const lastFew = [...today].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,3);
  const hour = now.getHours();
  const greeting = hour<12?"Доброе утро":hour<18?"Добрый день":"Добрый вечер";

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* Hero card */}
      <div style={{...glass,background:"linear-gradient(135deg,rgba(167,139,250,0.25),rgba(96,165,250,0.2))",padding:24,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-30,right:-30,width:120,height:120,borderRadius:"50%",background:"radial-gradient(circle,rgba(167,139,250,0.4),transparent 70%)",pointerEvents:"none"}}/>
        <p style={{color:"rgba(255,255,255,0.6)",fontSize:13,margin:"0 0 2px"}}>{greeting} 👋</p>
        <p style={{color:"rgba(255,255,255,0.4)",fontSize:12,margin:"0 0 18px"}}>
          {now.toLocaleDateString("ru-RU",{weekday:"long",day:"numeric",month:"long"})}
        </p>
        <p style={{color:"rgba(255,255,255,0.55)",fontSize:13,margin:"0 0 4px"}}>Сегодня потрачено</p>
        <p style={{color:"white",fontSize:42,fontWeight:"700",margin:"0 0 20px",letterSpacing:-1}}>{formatMoney(todayTotal)}</p>
        <div style={{display:"flex",gap:12}}>
          <div style={{flex:1,background:"rgba(255,255,255,0.08)",borderRadius:16,padding:"12px 16px"}}>
            <p style={{color:"rgba(255,255,255,0.5)",fontSize:11,margin:"0 0 4px"}}>За месяц</p>
            <p style={{color:"white",fontSize:16,fontWeight:"700",margin:0}}>{formatMoney(monthTotal)}</p>
          </div>
          <div style={{flex:1,background:"rgba(255,255,255,0.08)",borderRadius:16,padding:"12px 16px"}}>
            <p style={{color:"rgba(255,255,255,0.5)",fontSize:11,margin:"0 0 4px"}}>Бюджет</p>
            <p style={{color:monthTotal>budget?"#FF6B6B":"#34D399",fontSize:16,fontWeight:"700",margin:0}}>
              {monthTotal>budget?"−"+formatMoney(monthTotal-budget):"+"+formatMoney(budget-monthTotal)}
            </p>
          </div>
        </div>
      </div>

      {/* Budget bar */}
      <div style={{...glass,padding:20}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <span style={{color:"rgba(255,255,255,0.6)",fontSize:13}}>Месячный бюджет</span>
          <span style={{color:"rgba(255,255,255,0.6)",fontSize:13}}>{budget>0?Math.round(monthTotal/budget*100):0}%</span>
        </div>
        <Bar value={monthTotal} max={budget} color="#A78BFA"/>
        <p style={{color:"rgba(255,255,255,0.3)",fontSize:12,marginTop:8}}>{formatMoney(monthTotal)} из {formatMoney(budget)}</p>
      </div>

      {/* Quick categories */}
      <div style={{...glass,padding:20}}>
        <p style={{color:"rgba(255,255,255,0.6)",fontSize:13,margin:"0 0 14px",fontWeight:"600"}}>Быстрый расход</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
          {CATEGORIES.map(c=>(
            <button key={c.id} onClick={onAdd}
              style={{background:`${c.color}18`,border:`1px solid ${c.color}30`,borderRadius:16,padding:"12px 4px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer"}}>
              <span style={{fontSize:22}}>{c.emoji}</span>
              <span style={{color:"rgba(255,255,255,0.6)",fontSize:10,fontFamily:"system-ui"}}>{c.label}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Recent */}
      {lastFew.length>0&&(
        <div style={{...glass,padding:"16px 20px"}}>
          <p style={{color:"rgba(255,255,255,0.6)",fontSize:13,margin:"0 0 14px",fontWeight:"600"}}>Последние сегодня</p>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {lastFew.map(e=>{
              const cat=getCat(e.category);
              return (
                <div key={e.id} style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:34,height:34,borderRadius:10,flexShrink:0,background:`${cat.color}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,border:`1px solid ${cat.color}35`}}>{cat.emoji}</div>
                  <span style={{color:"rgba(255,255,255,0.8)",fontSize:14,flex:1}}>{e.note}</span>
                  <span style={{color:"white",fontSize:14,fontWeight:"600"}}>−{formatMoney(e.amount)}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Analysis screen ────────────────────────────────────────────────────────
function AnalysisScreen({ expenses, budget }) {
  const [period, setPeriod] = useState("month");
  const now = new Date();
  const filtered = expenses.filter(e=>{
    const d=new Date(e.date);
    if(period==="today") return e.date.slice(0,10)===todayStr();
    if(period==="week"){const w=new Date(now);w.setDate(now.getDate()-7);return d>=w;}
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  });
  const total = filtered.reduce((s,e)=>s+e.amount,0);
  const byCat = CATEGORIES.map(c=>{
    const amount=filtered.filter(e=>e.category===c.id).reduce((s,e)=>s+e.amount,0);
    const count=filtered.filter(e=>e.category===c.id).length;
    return {...c,amount,count};
  }).filter(c=>c.amount>0).sort((a,b)=>b.amount-a.amount);
  const days = Array.from({length:14},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(13-i));
    const ds=d.toISOString().slice(0,10);
    return {day:d.getDate(),amount:expenses.filter(e=>e.date.slice(0,10)===ds).reduce((s,e)=>s+e.amount,0)};
  });
  const maxDay = Math.max(...days.map(d=>d.amount),1);
  const periods=[{id:"today",label:"Сегодня"},{id:"week",label:"Неделя"},{id:"month",label:"Месяц"}];

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{...glassDeep,padding:"6px",display:"flex",gap:4}}>
        {periods.map(p=>(
          <button key={p.id} onClick={()=>setPeriod(p.id)}
            style={{flex:1,padding:"10px",borderRadius:14,border:"none",background:period===p.id?"rgba(255,255,255,0.18)":"transparent",color:period===p.id?"white":"rgba(255,255,255,0.45)",fontSize:14,fontWeight:period===p.id?"600":"400",cursor:"pointer",fontFamily:"system-ui",transition:"all 0.2s"}}>
            {p.label}
          </button>
        ))}
      </div>
      <div style={{...glass,padding:24,display:"flex",alignItems:"center",gap:24}}>
        <Donut data={byCat} total={total}/>
        <div style={{flex:1}}>
          <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,margin:"0 0 4px"}}>Итого потрачено</p>
          <p style={{color:"white",fontSize:26,fontWeight:"700",margin:"0 0 12px"}}>{formatMoney(total)}</p>
          {period==="month"&&(
            <>
              <p style={{color:"rgba(255,255,255,0.4)",fontSize:12,margin:"0 0 6px"}}>Бюджет: {formatMoney(budget)}</p>
              <Bar value={total} max={budget} color="#A78BFA"/>
              <p style={{color:total>budget?"#FF6B6B":"#34D399",fontSize:12,marginTop:6}}>
                {total>budget?`Перерасход ${formatMoney(total-budget)}`:`Остаток ${formatMoney(budget-total)}`}
              </p>
            </>
          )}
        </div>
      </div>
      <div style={{...glass,padding:20}}>
        <p style={{color:"rgba(255,255,255,0.6)",fontSize:13,margin:"0 0 16px",fontWeight:"600"}}>Тренд за 14 дней</p>
        <div style={{display:"flex",alignItems:"flex-end",gap:5,height:60}}>
          {days.map((d,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{width:"100%",borderRadius:4,height:Math.max(3,(d.amount/maxDay)*52),background:d.day===now.getDate()?"linear-gradient(180deg,#A78BFA,#60A5FA)":"rgba(255,255,255,0.15)",transition:"height 0.4s"}}/>
              <span style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"system-ui"}}>{d.day}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{...glass,padding:20}}>
        <p style={{color:"rgba(255,255,255,0.6)",fontSize:13,margin:"0 0 16px",fontWeight:"600"}}>По категориям</p>
        {byCat.length===0&&<p style={{color:"rgba(255,255,255,0.3)",textAlign:"center",fontSize:14,padding:"20px 0"}}>Нет расходов</p>}
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {byCat.map(c=>(
            <div key={c.id}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{color:"white",fontSize:14}}>{c.emoji} {c.label}</span>
                <div style={{textAlign:"right"}}>
                  <span style={{color:"white",fontSize:14,fontWeight:"600"}}>{formatMoney(c.amount)}</span>
                  <span style={{color:"rgba(255,255,255,0.35)",fontSize:11,marginLeft:6}}>{c.count} шт</span>
                </div>
              </div>
              <Bar value={c.amount} max={total} color={c.color}/>
              <p style={{color:"rgba(255,255,255,0.35)",fontSize:11,marginTop:4}}>{total>0?Math.round(c.amount/total*100):0}% от суммы</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── History screen ─────────────────────────────────────────────────────────
function HistoryScreen({ expenses, onDelete }) {
  const sorted = [...expenses].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const grouped = {};
  sorted.forEach(e=>{ const k=e.date.slice(0,10); if(!grouped[k])grouped[k]=[]; grouped[k].push(e); });

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {Object.keys(grouped).length===0&&(
        <div style={{...glass,padding:40,textAlign:"center"}}>
          <p style={{fontSize:40}}>🌱</p>
          <p style={{color:"rgba(255,255,255,0.5)",fontSize:15}}>Нет записей</p>
          <p style={{color:"rgba(255,255,255,0.3)",fontSize:13}}>Нажмите + чтобы добавить первый расход</p>
        </div>
      )}
      {Object.keys(grouped).map(date=>{
        const dayTotal=grouped[date].reduce((s,e)=>s+e.amount,0);
        return (
          <div key={date} style={{...glass,padding:"16px 20px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
              <span style={{color:"rgba(255,255,255,0.5)",fontSize:13,fontWeight:"600"}}>{date===todayStr()?"Сегодня":formatDate(date)}</span>
              <span style={{color:"rgba(255,255,255,0.7)",fontSize:13,fontWeight:"600"}}>{formatMoney(dayTotal)}</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {grouped[date].map(e=>{
                const cat=getCat(e.category);
                return (
                  <div key={e.id} style={{display:"flex",alignItems:"center",gap:12,background:"rgba(255,255,255,0.05)",borderRadius:14,padding:"10px 14px"}}>
                    <div style={{width:38,height:38,borderRadius:12,flexShrink:0,background:`${cat.color}25`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,border:`1px solid ${cat.color}40`}}>{cat.emoji}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{color:"white",fontSize:14,margin:0,fontWeight:"500",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.note}</p>
                      <p style={{color:"rgba(255,255,255,0.35)",fontSize:12,margin:"2px 0 0"}}>{cat.label}</p>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <p style={{color:"white",fontSize:15,fontWeight:"700",margin:0}}>{formatMoney(e.amount)}</p>
                      <button onClick={()=>onDelete(e.id)} style={{background:"none",border:"none",color:"#FF6B6B",fontSize:11,cursor:"pointer",padding:"2px 0",fontFamily:"system-ui"}}>удалить</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(loadData);
  const [tab, setTab] = useState("home");
  const [showAdd, setShowAdd] = useState(false);
  const [showBudget, setShowBudget] = useState(false);

  useEffect(()=>{ saveData(data); },[data]);

  const addExpense = useCallback(e=>setData(d=>({...d,expenses:[e,...d.expenses]})),[]);
  const deleteExpense = useCallback(id=>setData(d=>({...d,expenses:d.expenses.filter(e=>e.id!==id)})),[]);
  const setBudget = useCallback(b=>setData(d=>({...d,budget:b})),[]);

  const tabs=[
    {id:"home", icon:"⌂", label:"Главная"},
    {id:"analysis", icon:"◎", label:"Анализ"},
    {id:"history", icon:"≡", label:"История"},
  ];

  const now = new Date();

  return (
    <>
      {/* BG */}
      <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",background:"radial-gradient(ellipse 80% 60% at 20% 10%,rgba(167,139,250,0.18),transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(96,165,250,0.15),transparent 60%),#0a0a14"}}/>

      <div style={{maxWidth:430,margin:"0 auto",minHeight:"100dvh",position:"relative",zIndex:1,display:"flex",flexDirection:"column"}}>
        {/* Status bar */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 24px 8px",flexShrink:0,paddingTop:"max(14px,env(safe-area-inset-top))"}}>
          <span style={{color:"rgba(255,255,255,0.7)",fontSize:13,fontWeight:"600"}}>
            {now.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"})}
          </span>
          <span style={{color:"rgba(255,255,255,0.4)",fontSize:16,letterSpacing:2}}>●●●●</span>
        </div>

        {/* Header */}
        <div style={{padding:"0 20px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <h1 style={{color:"white",fontSize:28,fontWeight:"800",letterSpacing:-0.5}}>
            {tabs.find(t=>t.id===tab)?.label}
          </h1>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setShowBudget(true)} style={{width:38,height:38,borderRadius:12,...glassDeep,border:"1px solid rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:17}}>⚙️</button>
            <button onClick={()=>setShowAdd(true)} style={{width:38,height:38,borderRadius:12,background:"linear-gradient(135deg,#A78BFA,#60A5FA)",border:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:24,color:"white",fontWeight:"300",boxShadow:"0 4px 20px rgba(167,139,250,0.5)"}}>+</button>
          </div>
        </div>

        {/* Content */}
        <div style={{flex:1,overflowY:"auto",padding:"0 16px 110px",scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}}>
          <div style={{animation:"fadeIn 0.3s ease"}} key={tab}>
            {tab==="home"     && <HomeScreen     expenses={data.expenses} budget={data.budget} onAdd={()=>setShowAdd(true)}/>}
            {tab==="analysis" && <AnalysisScreen expenses={data.expenses} budget={data.budget}/>}
            {tab==="history"  && <HistoryScreen  expenses={data.expenses} onDelete={deleteExpense}/>}
          </div>
        </div>

        {/* Tab bar */}
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,padding:"12px 20px",paddingBottom:"max(28px,env(safe-area-inset-bottom))",background:"rgba(10,10,20,0.85)",backdropFilter:"blur(30px)",WebkitBackdropFilter:"blur(30px)",borderTop:"1px solid rgba(255,255,255,0.1)",borderRadius:"24px 24px 0 0",display:"flex",gap:4}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,padding:"10px 4px",background:tab===t.id?"rgba(255,255,255,0.12)":"transparent",border:"none",borderRadius:16,display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",transition:"all 0.2s"}}>
              <span style={{fontSize:20,opacity:tab===t.id?1:0.35}}>{t.icon}</span>
              <span style={{fontSize:11,fontFamily:"system-ui",color:tab===t.id?"white":"rgba(255,255,255,0.35)",fontWeight:tab===t.id?"600":"400"}}>{t.label}</span>
            </button>
          ))}
        </div>
      </div>

      {showAdd    && <AddModal    onClose={()=>setShowAdd(false)}    onAdd={addExpense}/>}
      {showBudget && <BudgetModal onClose={()=>setShowBudget(false)} budget={data.budget} onSave={setBudget}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
